name: v27 visual nav alarm patch
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          css = '''
/* v27 visual/nav/alarm polish */
.mealMark{color:#15803d!important;font-weight:950!important;filter:none!important;text-shadow:none!important}
.placeMark{color:currentColor!important;font-weight:950!important;opacity:1!important}
.item.meal .itPlace,.next.meal .nextPlace{color:#14532d!important;opacity:1!important;font-weight:950!important}
.item.proc .itPlace,.next.proc .nextPlace,.now.proc .place{opacity:1!important;font-weight:950!important}
.next.meal .leave{background:#f0fdf4!important;border-color:#86efac!important;color:#14532d!important}
.next.meal .leave .lab,.next.meal .leave .val,.next.meal .leave b{color:#14532d!important}
.item.meal .mini{border-color:#86efac!important;color:#14532d!important}
body.nav-hidden nav{transform:translateY(112%)!important;opacity:.02!important}
.alarmToast{position:fixed;left:14px;right:14px;top:calc(12px + env(safe-area-inset-top));z-index:20;background:#111827;border:2px solid #f59e0b;color:white;border-radius:22px;padding:14px 16px;box-shadow:0 18px 40px #0009;max-width:430px;margin:auto;font-weight:950}.alarmToast b{display:block;font-size:20px}.alarmToast span{display:block;color:#fde68a;margin-top:4px}.alarmToast button{margin-top:10px;border:0;border-radius:14px;background:#f59e0b;color:#111827;font-weight:950;padding:8px 12px}
'''
          if '/* v27 visual/nav/alarm polish */' not in s:
              s = s.replace('\n</style>', css + '\n</style>')

          if 'function mark(meal)' not in s:
              needle = "function stats(d){var list=dayItems(d),ps=list.filter(function(i){return i.type==='procedure'}),ms=list.filter(function(i){return i.type==='meal'}),first=list[0],last=ps[ps.length-1],dinner=ms.find(function(i){return i.title==='Večeře'});return{count:ps.length,first:first?first.start:'—',end:last?last.end:'—',free:gap(last&&last.end,dinner&&dinner.start)}}"
              s = s.replace(needle, needle + "function mark(meal){return '<span class=\"'+(meal?'mealMark':'placeMark')+'\">'+(meal?'♨︎':'⌖')+'</span>'}")

          s = s.replace("(meal?'♨':'⌖')+' '+e(i.place)", "mark(meal)+' '+e(i.place)")
          s = s.replace("(meal?'♨':'⌖')+' '+e(next.place)", "mark(meal)+' '+e(next.place)")
          s = s.replace('<div class="lab">Odejít nejpozději</div>', '<div class="lab">⏰ Odejít nejpozději</div>')
          s = s.replace('<span>Odejít</span><b>', '<span>⏰ Odejít</span><b>')

          old = "function setupNav(){['scroll','touchstart','touchmove','click','keydown'].forEach(function(ev){window.addEventListener(ev,showNav,{passive:true})});showNav()}"
          new = "function setupNav(){['scroll','touchstart','touchmove','click','keydown'].forEach(function(ev){window.addEventListener(ev,showNav,{passive:true})});document.body.classList.remove('nav-hidden');clearTimeout(navTimer);navTimer=setTimeout(function(){document.body.classList.add('nav-hidden')},900)}"
          s = s.replace(old, new)
          old = "function initialJump(){if(didJump)return;didJump=true;setTimeout(function(){var c=document.querySelector('.content .card');if(c)c.scrollIntoView({block:'start'});showNav()},450)}"
          new = "function initialJump(){if(didJump)return;didJump=true;setTimeout(function(){var c=document.querySelector('.content .card');if(c)c.scrollIntoView({block:'start'});document.body.classList.remove('nav-hidden');clearTimeout(navTimer);navTimer=setTimeout(function(){document.body.classList.add('nav-hidden')},900)},450)}"
          s = s.replace(old, new)
          s = s.replace("setInterval(function(){render();showNav()},30000);", "setInterval(function(){render();if(window.scrollY>40)document.body.classList.add('nav-hidden')},30000);")

          # Simple visual alarm test: when current time is between alarm time and event start, show a banner.
          if 'function checkAlarmTest()' not in s:
              insert_after = "function setupNav(){"
              funcs = "function alarmToast(i,alarm){var old=document.querySelector('.alarmToast');if(old)old.remove();var box=document.createElement('div');box.className='alarmToast';box.innerHTML='<b>⏰ Test budíku: vyrazit</b><span>'+e(i.title)+' · '+e(i.place)+' · upozornění '+ft(alarm)+'</span><button>zavřít</button>';document.body.appendChild(box);box.querySelector('button').onclick=function(){box.remove()};setTimeout(function(){if(box.parentNode)box.remove()},25000)}function checkAlarmTest(){try{window.__lcFired=window.__lcFired||{};var now=new Date();data.items.forEach(function(i){var st=T(i.date,i.start),leave=addM(st,-data.stay.leaveBufferMinutes),alarm=addM(leave,-5),key=i.id+'|'+ft(alarm);if(window.__lcFired[key])return;if(now>=alarm&&now<st){window.__lcFired[key]=1;alarmToast(i,alarm)}})}catch(e){}}"
              s = s.replace(insert_after, funcs + insert_after)
              s = s.replace('initialJump()}catch(err)', 'initialJump();checkAlarmTest()}catch(err)')
              s = s.replace('setInterval(function(){render();if(window.scrollY>40)document.body.classList.add(\'nav-hidden\')},30000);', 'setInterval(function(){render();checkAlarmTest();if(window.scrollY>40)document.body.classList.add(\'nav-hidden\')},30000);')

          s = s.replace("var VERSION='v25-nav-autohide-timefit'", "var VERSION='v27-visual-nav-alarm-test'")
          s = s.replace("var VERSION='v26-visual-nav-alarm'", "var VERSION='v27-visual-nav-alarm-test'")
          p.write_text(s, encoding='utf-8')
          Path('.github/workflows/v27-visual-nav-alarm.yml').unlink(missing_ok=True)
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "apply v27 visual nav alarm test"
          git push
