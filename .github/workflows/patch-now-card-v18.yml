name: Patch current card spacing v18

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch current card spacing
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace(".now{min-height:170px}", ".now{min-height:208px}")
          s = s.replace(".now .ringbox{position:absolute;right:18px;bottom:8px}", ".now .ringbox{position:absolute;right:18px;bottom:18px}")
          s = s.replace("var VERSION='v17-ring-polish'", "var VERSION='v18-current-card-spacing'")
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet index.html; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "restore current card spacing"
          git push
