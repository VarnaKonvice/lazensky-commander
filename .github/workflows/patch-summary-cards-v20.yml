name: Patch summary cards compact v20

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch summary stat cards
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}', '.stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-top:16px}')
          s = s.replace('.stat{background:#1e293b;border:1px solid #475569;border-radius:20px;padding:10px}', '.stat{background:#1e293b;border:1px solid #475569;border-radius:20px;padding:9px;min-width:0;overflow:hidden}')
          s = s.replace('.stat span{display:block;color:#cbd5e1;font-size:14px}', '.stat span{display:block;color:#cbd5e1;font-size:13px;white-space:nowrap}')
          s = s.replace('.stat b{display:block;font-size:32px;line-height:1;margin-top:8px;white-space:nowrap}', '.stat b{display:block;font-size:clamp(27px,8.2vw,32px);line-height:1;margin-top:8px;white-space:nowrap;letter-spacing:-.05em}')
          s = s.replace("var VERSION='v19-current-card-taller'", "var VERSION='v20-summary-card-fix'")
          s = s.replace("var VERSION='v18-current-card-spacing'", "var VERSION='v20-summary-card-fix'")
          s = s.replace("var VERSION='v17-ring-polish'", "var VERSION='v20-summary-card-fix'")
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          if git diff --quiet index.html; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "fix summary card stat overflow"
          git push
