name: One time landscape patch
on:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, 'apply landscape safe compact patch') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch index.html
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace("var VERSION='v37-landscape-one-column'", "var VERSION='v38-landscape-safe-compact'")
          override = r'''
@media (orientation:landscape) and (max-height:520px){
  .app{max-width:none;width:100%;padding-bottom:88px}
  .head{padding:calc(4px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) 8px calc(16px + env(safe-area-inset-left));border-radius:0 0 22px 22px}
  .hero{gap:10px}.logo{width:44px;height:44px;border-radius:14px}.title{font-size:28px}
  .content{display:flex!important;flex-direction:column!important;align-items:stretch!important;gap:10px;padding:10px calc(16px + env(safe-area-inset-right)) 10px calc(16px + env(safe-area-inset-left))!important}
  .content>section,.content>.list{width:100%;min-width:0}
  .card{border-radius:22px;padding:12px}.date{font-size:30px}.stats{gap:8px;margin-top:10px}.stat{border-radius:16px;padding:8px}.stat b{font-size:28px}.full{border-radius:16px;padding:10px;font-size:16px}
  .nowCard{padding:12px}.nowGrid{grid-template-columns:minmax(0,1fr) 70px;gap:10px;margin-top:12px}.nowTitle{font-size:24px}.nowBig .num{font-size:58px}.nowBig .unit{font-size:18px}.nowBig.long{font-size:34px;letter-spacing:-.02em}.nowSub{font-size:16px;margin-top:6px}.nowDetail{margin-top:10px;border-radius:18px;padding:10px}.nowDetail span{font-size:13px}.nowDetail b{font-size:24px}.nowDetail small{font-size:18px}.ring{width:58px;height:58px;font-size:17px}.ring:before{inset:8px}.rlabel{font-size:10px}
  .next{display:grid;grid-template-columns:minmax(0,1fr) minmax(190px,260px);grid-template-areas:'k pill' 'time leave' 'title leave' 'place leave';column-gap:12px;align-items:center;padding:12px}
  .next .k{grid-area:k;padding-right:0;font-size:14px}.next .pill{grid-area:pill;position:static;justify-self:end;align-self:start}.nextTime{grid-area:time;font-size:46px;margin-top:6px}.nextTitle{grid-area:title;font-size:28px;margin-top:3px}.nextPlace{grid-area:place;font-size:18px;margin-top:6px}.leaveGrid{grid-area:leave;grid-template-columns:minmax(0,1fr) 58px;gap:8px;margin-top:0}.leave{border-radius:18px;padding:10px}.lab{font-size:12px}.val{font-size:28px}.start{font-size:11px}
  .list{display:flex!important;flex-direction:column!important;grid-column:auto!important;gap:10px}.item{border-radius:22px;padding:12px;grid-template-columns:minmax(0,1fr) 82px}.itTime{font-size:28px}.itTitle{font-size:23px;margin-top:8px}.itPlace{font-size:18px;margin-top:7px;white-space:normal;overflow-wrap:anywhere}.mini b{font-size:23px}.tag{font-size:10px}
  .topstats,.infoGrid{gap:10px}.topstat b{font-size:42px}textarea{height:160px}
  nav{padding:6px calc(8px + env(safe-area-inset-right)) calc(6px + env(safe-area-inset-bottom)) calc(8px + env(safe-area-inset-left))}.ico{font-size:20px;margin-bottom:3px}nav button{padding:8px 4px;font-size:11px}
}
'''
          if 'v38-landscape-safe-compact' not in s:
              s = s.replace('</style>', override + '\n</style>')
          elif 'grid-template-areas' not in s:
              s = s.replace('</style>', override + '\n</style>')
          p.write_text(s, encoding='utf-8')
          Path('.github/workflows/patch-landscape-once.yml').unlink()
          PY
      - name: Commit patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/patch-landscape-once.yml
          git commit -m "apply landscape safe compact patch" || exit 0
          git push
