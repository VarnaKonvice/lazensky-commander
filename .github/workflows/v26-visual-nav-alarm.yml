name: v26 visual nav alarm patch
on:
  push:
    branches: [ main ]
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app and remove workflow
        run: |
          python3 <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          css = """
/* v26 visual/nav/alarm polish */
.mealMark{color:#15803d;font-weight:950;filter:none!important;text-shadow:none!important}
.placeMark{color:currentColor;font-weight:950;opacity:1!important}
.item.meal .itPlace,.next.meal .nextPlace{color:#14532d!important;opacity:1!important;font-weight:950}
.item.proc .itPlace,.next.proc .nextPlace,.now.proc .place{opacity:1!important;font-weight:950}
.next.meal .leave{background:#f0fdf4!important;border-color:#86efac!important;color:#14532d!important}
.next.meal .leave .lab,.next.meal .leave .val,.next.meal .leave b{color:#14532d!important}
.item.meal .mini{border-color:#86efac!important;color:#14532d!important}
.item.proc .mini{border-color:#ddd6fe!important;color:#4c1d95!important}
"""
          if '/* v26 visual/nav/alarm polish */' not in s:
              s = s.replace('\n</style>', css + '\n</style>')

          if 'function mark(meal)' not in s:
              needle = "function stats(d){var list=dayItems(d),ps=list.filter(function(i){return i.type==='procedure'}),ms=list.filter(function(i){return i.type==='meal'}),first=list[0],last=ps[ps.length-1],dinner=ms.find(function(i){return i.title==='Večeře'});return{count:ps.length,first:first?first.start:'—',end:last?last.end:'—',free:gap(last&&last.end,dinner&&dinner.start)}}"
              repl = needle + "function mark(meal){return '<span class=\"'+(meal?'mealMark':'placeMark')+'\">'+(meal?'♨︎':'⌖')+'</span>'}"
              s = s.replace(needle, repl)

          s = s.replace("(meal?'♨':'⌖')+' '+e(i.place)", "mark(meal)+' '+e(i.place)")
          s = s.replace("(meal?'♨':'⌖')+' '+e(next.place)", "mark(meal)+' '+e(next.place)")
          s = s.replace('<div class="lab">Odejít nejpozději</div>', '<div class="lab">⏰ Odejít nejpozději</div>')
          s = s.replace('<span>Odejít</span><b>'+"'", '<span>⏰ Odejít</span><b>'+"'")
          s = s.replace("<span>Odejít</span><b>", "<span>⏰ Odejít</span><b>")

          old_setup = "function setupNav(){['scroll','touchstart','touchmove','click','keydown'].forEach(function(ev){window.addEventListener(ev,showNav,{passive:true})});showNav()}"
          new_setup = "function setupNav(){['scroll','touchstart','touchmove','click','keydown'].forEach(function(ev){window.addEventListener(ev,showNav,{passive:true})});document.body.classList.remove('nav-hidden');clearTimeout(navTimer);navTimer=setTimeout(function(){document.body.classList.add('nav-hidden')},1200)}"
          s = s.replace(old_setup, new_setup)

          old_jump = "function initialJump(){if(didJump)return;didJump=true;setTimeout(function(){var c=document.querySelector('.content .card');if(c)c.scrollIntoView({block:'start'});showNav()},450)}"
          new_jump = "function initialJump(){if(didJump)return;didJump=true;setTimeout(function(){var c=document.querySelector('.content .card');if(c)c.scrollIntoView({block:'start'});document.body.classList.remove('nav-hidden');clearTimeout(navTimer);navTimer=setTimeout(function(){document.body.classList.add('nav-hidden')},1200)},450)}"
          s = s.replace(old_jump, new_jump)
          s = s.replace("setInterval(function(){render();showNav()},30000);", "setInterval(function(){render();if(window.scrollY>40)document.body.classList.add('nav-hidden')},30000);")
          s = s.replace("var VERSION='v25-nav-autohide-timefit'", "var VERSION='v26-visual-nav-alarm'")
          p.write_text(s, encoding='utf-8')
          wf = Path('.github/workflows/v26-visual-nav-alarm.yml')
          if wf.exists():
              wf.unlink()
          PY
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "polish icons nav and alarm labels"
          git push
