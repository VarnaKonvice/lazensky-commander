name: Update today alarms

on:
  schedule:
    - cron: "45 0,1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-today:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate today.json
        run: python3 scripts/generate_today.py

      - name: Commit today.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet today.json; then
            echo "today.json beze zmen"
            exit 0
          fi

          git add today.json
          git commit -m "update today alarms"
          git push
