mmary(d,'Zítra')+'<div class="list">'+dayItems(d).map(function(i){return item(i,fake)}).join('')+'</div></main>'}function week(){var now=new Date(),shown=dates().filter(function(d){return dayItems(d).some(function(i){return T(i.date,i.end)>=now})});if(!shown.length)shown=dates();return '<main class="content">'+shown.map(function(d){return '<section><button style="all:unset;display:block;width:100%" data-open="'+d+'">'+summary(d,'Den pobytu')+'</button>'+(openDate===d?'<div class="list" style="margin-top:12px">'+dayItems(d).map(function(i){return item(i,T(d,'06:00'))}).join('')+'</div>':'')+'</section>'}).join('')+'</main>'}function stayView(){var now=new Date(),rows=new Map();data.items.filter(function(i){return i.type==='procedure'}).forEach(function(i){var r=rows.get(i.title)||{name:i.title,planned:0,used:0};r.planned++;if(done(i,now))r.used++;rows.set(i.title,r)});var arr=Array.from(rows.values()).sort(function(a,b){return b.planned-a.planned||a.name.localeCompare(b.name,'cs')}),used=arr.reduce(function(a,r){return a+r.used},0),planned=arr.reduce(function(a,r){return a+r.planned},0),ds=dates(),elapsed=ds.filter(function(d){return D(d)<=D(iso(now))}).length,s=data.stay;return '<main class="content"><div class="topstats"><div class="topstat" style="background:#1e1038;border-color:#6d28d9"><span>Procedury</span><b>'+used+'/'+planned+'</b><p>vyčerpáno / plán</p></div><div class="topstat" style="background:#04251f;border-color:#16a34a"><span>Dny pobytu</span><b>'+elapsed+'/'+ds.length+'</b><p>dnes / celkem</p></div></div><section class="card dark"><h2>Informace o pobytu</h2><div class="infoGrid"><div class="info"><span>Lázně</span><b>'+e(s.spaName)+'</b></div><div class="info"><span>Pobyt</span><b>'+ff(s.stayFrom)+' až '+ff(s.stayTo)+'</b></div><div class="info"><span>Lékař</span><b>'+e(s.doctor)+'</b></div><div class="info"><span>Diagnóza</span><b>'+e(s.diagnosis)+'</b></div><div class="info"><span>Pokoj</span><b>'+e(s.room)+'</b></div><div class="info"><span>Jídlo</span><b>'+e(s.mealShift)+'</b></div><div class="info wide"><span>Přesun</span><b>'+e(s.leaveBufferMinutes)+' min rezerva před událostí</b></div></div></section><section class="card dark"><h2>Souhrn procedur</h2><div class="list">'+arr.map(function(r){return '<div class="info"><div style="display:grid;grid-template-columns:1fr auto;gap:12px"><b>'+e(r.name)+'</b><b>'+r.used+'/'+r.planned+'</b></div></div>'}).join('')+'</div></section></main>'}function importView(){return '<main class="content"><section class="card dark"><h2>Import / změna rozpisu</h2><textarea id="raw">'+e(raw)+'</textarea><button class="btn" id="load">Načíst</button></section></main>'}function nav(){var tabs=[['today','Dnes','◷'],['tomorrow','Zítra','▦'],['week','Týden','▦'],['stay','Pobyt','♙'],['import','Import','☁']];return '<nav><div class="nav">'+tabs.map(function(t){return '<button data-tab="'+t[0]+'" class="'+(tab===t[0]?'active':'')+'"><span class="ico">'+t[2]+'</span>'+t[1]+'</button>'}).join('')+'</div></nav>'}function render(){try{var views={today:today,tomorrow:tomorrow,week:week,stay:stayView,import:importView};app.innerHTML='<div class="app">'+header()+views[tab]()+nav()+'</div>';bind();fitText();initialJump();checkSignals()}catch(err){app.innerHTML='<div class="fatal"><b>Chyba aplikace</b>'+e(err.message)+'<br>'+VERSION+'</div>'}}function bind(){document.querySelectorAll('[data-tab]').forEach(function(b){b.onclick=function(){showNav();tab=b.dataset.tab;if(tab==='week')openDate=null;window.scrollTo(0,0);render()}});document.querySelectorAll('[data-open]').forEach(function(b){b.onclick=function(){showNav();openDate=openDate===b.dataset.open?'':b.dataset.open;render()}});var load=document.getElementById('load');if(load)load.onclick=function(){try{raw=document.getElementById('raw').value;data=normalize(raw);localStorage.setItem(STORE,JSON.stringify(data));render()}catch(err){alert(err.message)}}}function init(){try{navigator.serviceWorker&&navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister()})})}catch(e){}try{data=localStorage.getItem(STORE)?normalize(localStorage.getItem(STORE)):null}catch(e){data=null}if(!data)data=build();raw=JSON.stringify(data,null,2);setupNav();render();setInterval(function(){render();checkSignals();if(window.scrollY>40)document.body.classList.add('nav-hidden')},30000);window.addEventListener('resize',function(){setTimeout(fitText,50)})}init();})();
