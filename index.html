(function(){'use strict';var VERSION='v22-layout-fit';var STORAGE='lazensky_commander_schedule_v10';var app=document.getElementById('app');var stay={appName:'Lázeňský Komandér',spaName:'Slatinné lázně Třeboň',mealShift:'1. směna',leaveBufferMinutes:15,room:'1LDB-A / 133',doctor:'MUDr. Čech',diagnosis:'G112 Mozečková ataxie',doctorOffice:'Ordinace 214 · 2. patro · LDB',stayFrom:'2026-05-22',stayTo:'2026-06-18'};var procs=[['Slatinná koupel','LDB-Slatina 1',20],['Klasická masáž částečná','LDB-Slatina 1',20],['Vysokoindukční magnet','LDB-Elektroléčba',20],['Parafínový zábal','LDB-Parafín',20],['IMOOVE','LDB-Fyzioterapie 4',20],['Vířivka dolní končetiny','LDB-Vodoléčba',20],['Ultrazvuk','LDB-Elektroléčba',20],['Fyzioterapie individuální','LDB-Fyzioterapie 3',30],['Skupinové cvičení','Tělocvična',30],['Bazén','LDB-Bazén',30]];var patterns=[['08:15','08:45','10:30'],['08:00','09:30','12:00'],['09:00','10:30','12:15'],['08:05','08:40','10:30'],['08:30','10:00','12:10'],['09:15','11:50']];var tab='today',openDate=null,data=null,raw='';function p(n){return String(n).padStart(2,'0')}function iso(d){return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())}function D(s){return new Date(s+'T12:00:00')}function T(d,t){return new Date(d+'T'+t+':00')}function addD(d,n){var x=new Date(d);x.setHours(12,0,0,0);x.setDate(x.getDate()+n);return x}function addM(d,m){return new Date(d.getTime()+m*60000)}function mins(a,b){return Math.round((b-a)/60000)}function tAdd(t,m){var q=t.split(':').map(Number),v=q[0]*60+q[1]+m;return p(Math.floor(v/60))+':'+p(v%60)}function ft(d){return new Intl.DateTimeFormat('cs-CZ',{hour:'2-digit',minute:'2-digit'}).format(d)}function fd(s){return new Intl.DateTimeFormat('cs-CZ',{weekday:'long',day:'numeric',month:'numeric'}).format(D(s))}function ff(s){return new Intl.DateTimeFormat('cs-CZ',{day:'numeric',month:'numeric',year:'numeric'}).format(D(s))}function e(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;',' <div class="leaveGrid"><div class="leave"><div class="lab">Odejít nejpozději</div><div class="val">'+ft(leave)+'</div><b>za '+cnt(toLeave)+'</b></div><div class="start">Začíná za'+ring(toStart,null)+'</div></div></section>'}function item(i,now){var meal=i.type==='meal',leave=ft(addM(T(i.date,i.start),-data.stay.leaveBufferMinutes));return '<article class="item '+(meal?'meal':'proc')+' '+(done(i,now)?'done':'')+'"><div><div class="itTime"><span>'+i.start+'</span><span class="end"> – '+i.end+'</span></div><div class="itTitle">'+e(i.title)+'</div><div class="itPlace">'+(meal?'♨':'⌖')+' '+e(i.place)+'</div></div><div class="right"><span class="tag">'+(meal?'Jídlo':'Procedura')+'</span><div class="mini"><span>Odejít</span><b>'+leave+'</b></div></div></article>'}function today(){var now=new Date(),ds=dates(),td=ds.indexOf(iso(now))>=0?iso(now):ds[0],view=ds.indexOf(iso(now))>=0?now:T(td,'07:20'),list=dayItems(td),cur=list.find(function(i){return view>=T(i.date,i.start)&&view<=T(i.date,i.end)}),nextToday=list.find(function(i){return T(i.date,i.start)>view}),next2=data.items.filter(function(i){return T(i.date,i.start)>view}).sort(function(a,b){return T(a.date,a.start)-T(b.date,b.start)}).slice(0,2),vis=list.filter(function(i){return !done(i,view)}),rest=vis.filter(function(i){return(!cur||i.id!==cur.id)&&!next2.some(function(n){return n.id===i.id})});return '<main class="content">'+summary(td,'Dnešní program')+(cur?nowCard(cur,view):freeCard(nextToday,view))+next2.map(function(i,n){return nextCard(i,view,n)}).join('')+(rest.length?'<div class="list">'+rest.map(function(i){return item(i,view)}).join('')+'</div>':'')+'</main>'}function tomorrow(){var now=new Date(),ds=dates(),d=ds.indexOf(iso(addD(now,1)))>=0?iso(addD(now,1)):(ds[1]||ds[0]),fake=T(d,'06:00');return '<main class="content">'+summary(d,'Zítra')+'<div class="list">'+dayItems(d).map(function(i){return item(i,fake)}).join('')+'</div></main>'}function week(){var now=new Date(),ds=dates(),shown=ds.filter(function(d){return dayItems(d).some(function(i){return T(i.date,i.end)>=now})});if(!shown.length)shown=ds;if(openDate&&shown.indexOf(openDate)<0)openDate=null;return '<main class="content">'+shown.map(function(d){return '<section><button style="all:unset;display:block;width:100%" data-open="'+d+'">'+summary(d,'Den pobytu')+'</button>'+(openDate===d?'<div class="list" style="margin-top:12px">'+dayItems(d).map(function(i){return item(i,T(d,'06:00'))}).join('')+'</div>':'')+'</section>'}).join('')+'</main>'}function stayView(){var now=new Date(),rows=new Map();data.items.filter(function(i){return i.type==='procedure'}).forEach(function(i){var r=rows.get(i.title)||{name:i.title,planned:0,used:0};r.planned++;if(done(i,now))r.used++;rows.set(i.title,r)});var arr=Array.from(rows.values()).sort(function(a,b){return b.planned-a.planned||a.name.localeCompare(b.name,'cs')}),used=arr.reduce(function(a,r){return a+r.used},0),planned=arr.reduce(function(a,r){return a+r.planned},0),ds=dates(),elapsed=ds.filter(function(d){return D(d)<=D(iso(now))}).length;if(elapsed>ds.length)elapsed=ds.length;var s=data.stay;return '<main class="content"><div class="topstats"><div class="topstat" style="background:#1e1038;border-color:#6d28d9"><span>Procedury</span><b>'+used+'/'+planned+'</b><p>vyčerpáno / plán</p></div><div class="topstat" style="background:#04251f;border-color:#16a34a"><span>Dny pobytu</span><b>'+elapsed+'/'+ds.length+'</b><p>dnes / celkem</p></div></div><section class="card"><h2>Informace o pobytu</h2><div class="infoGrid"><div class="info"><span>Lázně</span><b>'+e(s.spaName)+'</b></div><div class="info"><span>Pobyt</span><b>'+ff(s.stayFrom)+' až '+ff(s.stayTo)+'</b></div><div class="info"><span>Lékař</span><b>'+e(s.doctor)+'</b></div><div class="info"><span>Diagnóza</span><b>'+e(s.diagnosis)+'</b></div><div class="info"><span>Pokoj</span><b>'+e(s.room)+'</b></div><div class="info"><span>Jídlo</span><b>'+e(s.mealShift)+'</b></div><div class="info wide"><span>Přesun</span><b>'+e(s.leaveBufferMinutes)+' min rezerva před událostí</b></div></div></section><section class="card"><h2>Souhrn procedur</h2><div class="list">'+arr.map(function(r){return '<div class="info"><div style="display:grid;grid-template-columns:1fr auto;gap:12px"><b>'+e(r.name)+'</b><b>'+r.used+'/'+r.planned+'</b></div></div>'}).join('')+'</div></section></main>'}function importView(){return '<main class="content"><section class="card"><h2>Import / změna rozpisu</h2><textarea id="raw">'+e(raw)+'</textarea><button class="btn" id="load">Načíst</button></section></main>'}function nav(){var tabs=[['today','Dnes','◷'],['tomorrow','Zítra','▦'],['week','Týden','▦'],['stay','Pobyt','♙'],['import','Import','☁']];return '<nav><div class="nav">'+tabs.map(function(t){return '<button data-tab="'+t[0]+'" class="'+(tab===t[0]?'active':'')+'"><span class="ico">'+t[2]+'</span>'+t[1]+'</button>'}).join('')+'</div></nav>'}function render(){try{var views={today:today,tomorrow:tomorrow,week:week,stay:stayView,import:importView};app.innerHTML='<div class="app">'+head()+views[tab]()+nav()+'</div>';bind();fitStats()}catch(err){app.innerHTML='<div class="fatal"><b>Chyba aplikace</b>'+e(err.message)+'<br>'+VERSION+'</div>'}}function bind(){document.querySelectorAll('[data-tab]').forEach(function(b){b.onclick=function(){tab=b.dataset.tab;if(tab==='week')openDate=null;window.scrollTo(0,0);render()}});document.querySelectorAll('[data-open]').forEach(function(b){b.onclick=function(){openDate=openDate===b.dataset.open?'':b.dataset.open;render()}});var load=document.getElementById('load');if(load)load.onclick=function(){try{raw=document.getElementById('raw').value;data=normalize(raw);localStorage.setItem(STORAGE,JSON.stringify(data));render()}catch(err){alert(err.message)}}}function init(){try{if(navigator.serviceWorker)navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister()})})}catch(x){}try{var saved=localStorage.getItem(STORAGE);data=saved?normalize(saved):null}catch(x){data=null}if(!data)data=build();raw=JSON.stringify(data,null,2);render();setInterval(render,30000);window.addEventListener('resize',function(){setTimeout(fitStats,50)})}init();})();
