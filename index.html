/* v39 landscape notch compact */
@media (orientation:landscape) and (max-height:520px){
  .app{
    max-width:none!important;
    width:100%!important;
    padding-bottom:88px!important;
  }

  .head{
    padding:
      calc(4px + env(safe-area-inset-top))
      max(18px, env(safe-area-inset-right))
      8px
      max(18px, env(safe-area-inset-left))!important;
    border-radius:0 0 22px 22px!important;
  }

  .hero{gap:10px!important}
  .logo{width:44px!important;height:44px!important;border-radius:14px!important}
  .title{font-size:28px!important}

  .content{
    display:flex!important;
    flex-direction:column!important;
    align-items:stretch!important;
    gap:10px!important;
    padding:
      10px
      max(18px, env(safe-area-inset-right))
      10px
      max(18px, env(safe-area-inset-left))!important;
  }

  .content>section,
  .content>.list{
    width:100%!important;
    min-width:0!important;
  }

  .card{
    border-radius:22px!important;
    padding:12px!important;
  }

  .date{font-size:30px!important}
  .stats{gap:8px!important;margin-top:10px!important}
  .stat{border-radius:16px!important;padding:8px!important}
  .stat b{font-size:28px!important}
  .full{border-radius:16px!important;padding:10px!important;font-size:16px!important}

  .nowCard{padding:12px!important}
  .nowGrid{
    grid-template-columns:minmax(0,1fr) 70px!important;
    gap:10px!important;
    margin-top:12px!important;
  }
  .nowTitle{font-size:24px!important}
  .nowBig .num{font-size:58px!important}
  .nowBig .unit{font-size:18px!important}
  .nowBig.long{
    font-size:34px!important;
    letter-spacing:-.02em!important;
    white-space:nowrap!important;
  }
  .nowSub{font-size:16px!important;margin-top:6px!important}
  .nowDetail{
    margin-top:10px!important;
    border-radius:18px!important;
    padding:10px!important;
  }
  .nowDetail span{font-size:13px!important}
  .nowDetail b{font-size:24px!important}
  .nowDetail small{font-size:18px!important}

  .ring{
    width:58px!important;
    height:58px!important;
    font-size:17px!important;
  }
  .ring:before{inset:8px!important}
  .rlabel{font-size:10px!important}

  .next{
    display:grid!important;
    grid-template-columns:minmax(0,1fr) clamp(190px,32vw,260px)!important;
    grid-template-areas:
      "k pill"
      "time leave"
      "title leave"
      "place leave"!important;
    column-gap:12px!important;
    align-items:center!important;
    padding:12px!important;
  }

  .next .k{
    grid-area:k!important;
    padding-right:0!important;
    font-size:14px!important;
  }
  .next .pill{
    grid-area:pill!important;
    position:static!important;
    justify-self:end!important;
    align-self:start!important;
  }
  .nextTime{
    grid-area:time!important;
    font-size:46px!important;
    margin-top:6px!important;
  }
  .nextTitle{
    grid-area:title!important;
    font-size:28px!important;
    margin-top:3px!important;
  }
  .nextPlace{
    grid-area:place!important;
    font-size:18px!important;
    margin-top:6px!important;
  }
  .leaveGrid{
    grid-area:leave!important;
    grid-template-columns:minmax(0,1fr) 58px!important;
    gap:8px!important;
    margin-top:0!important;
  }
  .leave{
    border-radius:18px!important;
    padding:10px!important;
  }
  .lab{font-size:12px!important}
  .val{font-size:28px!important}
  .start{font-size:11px!important}

  .list{
    display:flex!important;
    flex-direction:column!important;
    grid-column:auto!important;
    gap:10px!important;
  }
  .item{
    border-radius:22px!important;
    padding:12px!important;
    grid-template-columns:minmax(0,1fr) 92px!important;
  }
  .itTime{font-size:28px!important}
  .itTitle{
    font-size:23px!important;
    margin-top:8px!important;
  }
  .itPlace{
    font-size:18px!important;
    margin-top:7px!important;
    white-space:normal!important;
    overflow-wrap:anywhere!important;
  }
  .mini b{font-size:23px!important}
  .tag{font-size:10px!important}

  .topstats,
  .infoGrid{
    grid-template-columns:repeat(2,minmax(0,1fr))!important;
    gap:10px!important;
  }
  .topstat b{font-size:42px!important}

  textarea{height:160px!important}

  nav{
    padding:
      6px
      max(8px, env(safe-area-inset-right))
      calc(6px + env(safe-area-inset-bottom))
      max(8px, env(safe-area-inset-left))!important;
  }
  .ico{font-size:20px!important;margin-bottom:3px!important}
  nav button{padding:8px 4px!important;font-size:11px!important}
}
