<script>
(function(){
'use strict';
const VERSION='v5-safe';
const STORAGE_KEY='lazensky_commander_schedule_v5';

const app=document.getElementById('app');
const BASE_STAY={appName:'Lázeňský Komandér',spaName:'Slatinné lázně Třeboň',mealShift:'1. směna',leaveBufferMinutes:15,room:'1LDB-A / 133',doctor:'MUDr. Čech',diagnosis:'G112 Mozečková ataxie',doctorOffice:'Ordinace 214 · 2. patro · LDB',stayFrom:'2026-05-22',stayTo:'2026-06-18'};
const PROCS=[['Slatinná koupel','LDB-Slatina 1',20],['Klasická masáž částečná','LDB-Slatina 1',20],['Vysokoindukční magnet','LDB-Elektroléčba',20],['Parafínový zábal','LDB-Parafín',20],['IMOOVE','LDB-Fyzioterapie 4',20],['Vířivka dolní končetiny','LDB-Vodoléčba',20],['Ultrazvuk','LDB-Elektroléčba',20],['Fyzioterapie individuální','LDB-Fyzioterapie 3',30],['Skupinové cvičení','Tělocvična',30],['Bazén','LDB-Bazén',30]];
const PATTERNS=[['08:15','08:45','10:30'],['08:00','09:30','12:00'],['09:00','10:30','12:15'],['08:05','08:40','10:30'],['08:30','10:00','12:10'],['09:15','11:50']];
let state={tab:'today',data:null,done:new Set(),openDate:null,raw:'',msg:'Import připravený.',tone:''};
function pad(n){return String(n).padStart(2,'0')}function iso(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}function dateObj(s){return new Date(s+'T12:00:00')}function dt(d,t){return new Date(d+'T'+t+':00')}function addDays(d,n){const x=new Date(d);x.setHours(12,0,0,0);x.setDate(x.getDate()+n);return x}function addMinDate(d,m){return new Date(d.getTime()+m*60000)}function mins(a,b){return Math.round((b-a)/60000)}function timeAdd(t,m){const p=t.split(':').map(Number),v=p[0]*60+p[1]+m;return pad(Math.floor(v/60))+':'+pad(v%60)}function fmtTime(d){return new Intl.DateTimeFormat('cs-CZ',{hour:'2-digit',minute:'2-digit'}).format(d)}function fmtDate(s){return new Intl.DateTimeFormat('cs-CZ',{weekday:'long',day:'numeric',month:'numeric'}).format(dateObj(s))}function fmtFullDate(s){return new Intl.DateTimeFormat('cs-CZ',{day:'numeric',month:'numeric',year:'numeric'}).format(dateObj(s))}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}function countdown(m){if(m<=0)return'teď';if(m<60)return m+' min';const h=Math.floor(m/60),r=m%60;return r?`${h} h ${r} min`:`${h} h`}function ring(m){return m<180?[Math.max(0,m),'MIN']:[Math.floor(m/60),'HOD']}function parseM(t){if(!t||t==='—')return null;const p=t.split(':').map(Number);return p[0]*60+p[1]}function gap(a,b){const x=parseM(a),y=parseM(b);if(x==null||y==null)return'—';const d=y-x;if(d<=0)return'0 min';const h=Math.floor(d/60),m=d%60;return h&&m?`${h} h ${m} min`:h?`${h} h`:`${m} min`}
function makeData(){const start=dateObj(BASE_STAY.stayFrom),items=[];for(let day=0;day<28;day++){const d=addDays(start,day),date=iso(d),sun=d.getDay()===0;if(day===0){items.push({id:`meal-${date}-dinner`,type:'meal',date,start:'17:00',end:'17:45',title:'Večeře',place:'Jídelna'});continue}items.push({id:`meal-${date}-breakfast`,type:'meal',date,start:'07:00',end:'07:45',title:'Snídaně',place:'Jídelna'});if(!sun){const pat=day===1?['08:15','08:45','10:30']:PATTERNS[day%PATTERNS.length];pat.forEach((t,i)=>{const p=PROCS[(day*2+i)%PROCS.length];items.push({id:`proc-${date}-${i+1}`,type:'procedure',date,start:t,end:timeAdd(t,p[2]),title:p[0],place:p[1]})})}items.push({id:`meal-${date}-lunch`,type:'meal',date,start:'11:00',end:'11:45',title:'Oběd',place:'Jídelna'});items.push({id:`meal-${date}-dinner`,type:'meal',date,start:'17:00',end:'17:45',title:'Večeře',place:'Jídelna'})}return{stay:BASE_STAY,items}}
function normalize(x){const src=typeof x==='string'?JSON.parse(x):x;if(!src||!Array.isArray(src.items)||!src.items.length)throw Error('Import nemá položky items.');const items=src.items.map((i,n)=>{const type=i.type==='meal'?'meal':'procedure',date=String(i.date||''),start=String(i.start||''),end=String(i.end||i.start||''),title=String(i.title||i.name||''),place=String(i.place||i.location||'—');if(!date||!start||!title)throw Error('Položka '+(n+1)+' nemá datum, čas nebo název.');return{id:i.id||`${type}-${date}-${start}-${n}`,type,date,start,end,title,place}});const ds=dates(items);return{stay:{...BASE_STAY,...(src.stay||{}),stayFrom:src.stay?.stayFrom||ds[0],stayTo:src.stay?.stayTo||ds[ds.length-1]},items}}
function dates(items=state.data.items){return Array.from(new Set(items.map(i=>i.date))).sort()}function dayItems(date){return state.data.items.filter(i=>i.date===date).sort((a,b)=>a.start.localeCompare(b.start))}function dayStats(date){const list=dayItems(date),procs=list.filter(i=>i.type==='procedure'),meals=list.filter(i=>i.type==='meal'),first=list[0],last=procs[procs.length-1],dinner=meals.find(i=>i.title==='Večeře');return{count:procs.length,first:first?.start||'—',end:last?.end||'—',free:gap(last?.end,dinner?.start)}}function isDone(item,now){return state.done.has(item.id)||dt(item.date,item.end)<now}
function header(){const s=state.data.stay;return`<header><div class="top"><button class="ghost">☰</button><button class="ghost">⚙</button></div><div class="hero"><img class="logo" src="./icon-180.png" alt="Logo"><div><h1>${esc(s.appName)}</h1><div class="meta"><div>⌖ ${esc(s.spaName)}</div><div>◷ Rezerva na přesun: ${esc(s.leaveBufferMinutes)} min</div></div></div></div></header>`}
function emptyNow(next){return`<section class="card empty"><div class="kicker">Právě teď</div><div class="emptytitle">Volno</div><div class="emptytext">${next?`Další položka začíná v ${next.start}`:'Na dnešek už nic dalšího nevidím.'}</div></section>`}function nowCard(cur,now){if(!cur)return'';const left=Math.max(0,mins(now,dt(cur.date,cur.end))),meal=cur.type==='meal',r=ring(left);return`<section class="card now ${meal?'meal':'procedure'}"><span class="pill">Probíhá</span><div class="kicker">Právě teď</div><div class="nowtime">${cur.start} – ${cur.end}</div><div class="nowtitle">${esc(cur.title)}</div><div class="place">${meal?'♨':'⌖'} ${esc(cur.place)}</div><div class="ringbox"><div class="ringlabel">Zbývá</div><div class="ring">${r[0]}<small>${r[1]}</small></div></div></section>`}
function nextCard(next,now){if(!next)return'';const meal=next.type==='meal',start=dt(next.date,next.start),leave=addMinDate(start,-state.data.stay.leaveBufferMinutes),toStart=Math.max(0,mins(now,start)),toLeave=Math.max(0,mins(now,leave)),r=ring(toStart),tomorrow=iso(now)!==next.date;return`<section class="card next ${meal?'meal':'procedure'}"><span class="pill">Následuje</span><div class="kicker">${meal?'Další jídlo':'Další procedura'}${tomorrow?' · '+fmtDate(next.date):''}</div><div class="nexttime">${next.start}</div><div class="nexttitle">${esc(next.title)}</div><div class="nextplace">${meal?'♨':'⌖'} ${esc(next.place)}</div><div class="leavegrid"><div class="leave"><div class="label">Odejít nejpozději</div><div class="value">${fmtTime(leave)}</div><b>za ${countdown(toLeave)}</b></div><div class="startlabel">Začíná za<div class="ring">${r[0]}<small>${r[1]}</small></div></div></div></section>`}
function summary(date,label){const s=dayStats(date);return`<section class="card day"><div class="kicker">${label}</div><div class="date">${fmtDate(date)}</div><div class="stats"><div class="stat"><span>Procedury</span><b>${s.count}</b></div><div class="stat"><span>První</span><b>${s.first}</b></div><div class="stat"><span>Konec</span><b>${s.end}</b></div></div><div class="fullstat">Volno po procedurách do večeře: <b>${s.free}</b></div></section>`}
function itemCard(i,now){const done=isDone(i,now),meal=i.type==='meal',leave=fmtTime(addMinDate(dt(i.date,i.start),-state.data.stay.leaveBufferMinutes));return`<article class="item ${meal?'meal':'procedure'} ${done?'done':''}"><div><div class="itemtime"><span>${i.start}</span><span class="end">– ${i.end}</span></div><div class="itemtitle">${esc(i.title)}</div><div class="itemplace">${meal?'♨':'⌖'} ${esc(i.place)}</div></div><div class="right"><span class="tag">${meal?'Jídlo':'Procedura'}</span><div class="mini"><span>Odejít</span><b>${leave}</b></div>${done?'<span class="checkmark">✓</span>':''}</div></article>`}
function todayView(){const now=new Date(),ds=dates(),today=ds.includes(iso(now))?iso(now):ds[0],viewNow=ds.includes(iso(now))?now:dt(today,'07:20'),list=dayItems(today),cur=list.find(i=>viewNow>=dt(i.date,i.start)&&viewNow<=dt(i.date,i.end)),nextToday=list.find(i=>dt(i.date,i.start)>viewNow),nextAny=state.data.items.filter(i=>dt(i.date,i.start)>viewNow).sort((a,b)=>dt(a.date,a.start)-dt(b.date,b.start))[0];return`<main class="content">${cur?nowCard(cur,viewNow):emptyNow(nextToday)}${nextCard(nextAny,viewNow)}${summary(today,'Dnešní program')}<div class="list">${list.map(i=>itemCard(i,viewNow)).join('')}</div></main>`}
function tomorrowView(){const now=new Date(),ds=dates(),d=ds.includes(iso(addDays(now,1)))?iso(addDays(now,1)):(ds[1]||ds[0]),fake=dt(d,'06:00');return`<main class="content">${summary(d,'Zítra')}<div class="list">${dayItems(d).map(i=>itemCard(i,fake)).join('')}</div></main>`}
function weekView(){const ds=dates();if(!state.openDate)state.openDate=ds[0];return`<main class="content">${ds.map(d=>`<section><button style="all:unset;display:block;width:100%" data-open="${d}">${summary(d,'Den pobytu')}</button>${state.openDate===d?`<div class="list" style="margin-top:12px;padding-left:6px">${dayItems(d).map(i=>itemCard(i,dt(d,'06:00'))).join('')}</div>`:''}</section>`).join('')}</main>`}
function stayView(){const now=new Date(),rows=new Map();state.data.items.filter(i=>i.type==='procedure').forEach(i=>{const r=rows.get(i.title)||{name:i.title,planned:0,used:0};r.planned++;if(isDone(i,now))r.used++;rows.set(i.title,r)});const arr=Array.from(rows.values()).sort((a,b)=>b.planned-a.planned||a.name.localeCompare(b.name,'cs')),used=arr.reduce((a,r)=>a+r.used,0),planned=arr.reduce((a,r)=>a+r.planned,0),s=state.data.stay,total=dates().length;return`<main class="content"><div class="topstats"><div class="topstat" style="background:#1e1038;border-color:#6d28d9"><span>Procedury</span><b>${used}/${planned}</b><p>vyčerpáno / plán</p></div><div class="topstat" style="background:#04251f;border-color:#16a34a"><span>Dny pobytu</span><b>${total}</b><p>celkem</p></div></div><section class="card"><h2>Informace o pobytu</h2><div class="info-grid"><div class="info"><span>Lázně</span><b>${esc(s.spaName)}</b></div><div class="info"><span>Pobyt</span><b>${fmtFullDate(s.stayFrom)} až ${fmtFullDate(s.stayTo)}</b></div><div class="info"><span>Lékař</span><b>${esc(s.doctor)}</b><p>${esc(s.doctorOffice)}</p></div><div class="info"><span>Diagnóza</span><b>${esc(s.diagnosis)}</b></div><div class="info"><span>Pokoj</span><b>${esc(s.room)}</b></div><div class="info"><span>Jídlo</span><b>${esc(s.mealShift)}</b></div></div></section><section class="card"><h2>Souhrn procedur</h2><div class="list">${arr.map(r=>`<div class="info"><div class="summary-row"><b>${esc(r.name)}</b><b>${r.used}/${r.planned}</b></div><div class="progress"><i style="width:${Math.round(r.used/r.planned*100)}%"></i></div></div>`).join('')}</div></section></main>`}
function importView(){return`<main class="content"><section class="card"><h2>Import / změna rozpisu</h2><div class="msg ${state.tone}">${esc(state.msg)}</div><textarea id="raw">${esc(state.raw)}</textarea><div class="actions"><button class="btn" id="loadRaw">Načíst</button><button class="btn secondary" id="sample">28 dnů</button></div><label class="filebtn">Vybrat JSON soubor<input id="file" type="file" accept=".json,application/json,text/plain"></label></section></main>`}
function nav(){const tabs=[['today','Dnes','◷'],['tomorrow','Zítra','▦'],['week','Týden','▦'],['stay','Pobyt','♙'],['import','Import','☁']];return`<nav><div class="nav-inner">${tabs.map(t=>`<button data-tab="${t[0]}" class="${state.tab===t[0]?'active':''}"><span class="ico">${t[2]}</span>${t[1]}</button>`).join('')}</div></nav>`}
function render(){try{const views={today:todayView,tomorrow:tomorrowView,week:weekView,stay:stayView,import:importView};app.innerHTML=`<div class="app">${header()}${views[state.tab]()}${nav()}</div>`;bind()}catch(e){app.innerHTML=`<div class="fatal"><b>Chyba aplikace</b>${esc(e.message)}<br><br>Verze: ${VERSION}</div>`;console.error(e)}}
function bind(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;window.scrollTo(0,0);render()});document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{state.openDate=state.openDate===b.dataset.open?'':b.dataset.open;render()});const load=document.getElementById('loadRaw');if(load)load.onclick=()=>{try{state.raw=document.getElementById('raw').value;state.data=normalize(state.raw);localStorage.setItem(STORAGE_KEY,JSON.stringify(state.data));state.msg='Načteno: '+state.data.items.length+' položek.';state.tone='ok';render()}catch(e){state.msg=e.message;state.tone='err';render()}};const sample=document.getElementById('sample');if(sample)sample.onclick=()=>{state.data=makeData();state.raw=JSON.stringify(state.data,null,2);localStorage.setItem(STORAGE_KEY,JSON.stringify(state.data));state.msg='Vložený testovací pobyt na 28 dnů.';state.tone='';render()};const file=document.getElementById('file');if(file)file.onchange=()=>{const f=file.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{state.raw=String(r.result||'');state.msg='Soubor připravený: '+f.name;state.tone='';render()};r.readAsText(f)}}
async function init(){try{const saved=localStorage.getItem(STORAGE_KEY);if(saved){state.data=normalize(saved)}else{try{const res=await fetch('./lazensky-import-28dni.json',{cache:'no-store'});state.data=normalize(await res.json())}catch{state.data=makeData()}}}catch{state.data=makeData()}try{state.done=new Set(JSON.parse(localStorage.getItem(DONE_KEY)||'[]'))}catch{state.done=new Set()}state.raw=JSON.stringify(state.data,null,2);render();setInterval(render,30000);if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js?'+VERSION).catch(()=>{})}}
window.addEventListener('error',e=>{app.innerHTML=`<div class="fatal"><b>Chyba načtení</b>${esc(e.message)}<br>Verze: ${VERSION}</div>`});
init();
})();
</script>
</body>
</html>
