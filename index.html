<style>

.ringbox{text-align:center}.now .ringbox{position:absolute;right:18px;bottom:18px}.ringlabel{font-size:12px;font-weight:950;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}.ring{--pct:20;--ring:#8b5cf6;--track:#d8cff0;--inner:#f8fafc;position:relative;width:76px;height:76px;border-radius:50%;display:grid;place-items:center;background:conic-gradient(var(--ring) calc(var(--pct)*1%),var(--track) 0);font-size:23px;font-weight:950;line-height:1;color:inherit}.ring:before{content:"";position:absolute;inset:10px;border-radius:50%;background:var(--inner)}.ring div{position:relative;z-index:1;text-align:center}.ring small{display:block;font-size:10px;opacity:.72;letter-spacing:.08em}.now.meal .ring{--track:rgba(255,255,255,.18);--inner:#04251f}.now.procedure .ring{--track:rgba(255,255,255,.18);--inner:#1e1038}
.free{background:var(--cyan);border:2px solid var(--cyanLine);color:#ecfeff;min-height:190px}.free .kicker{color:#67e8f9}.free .pill{color:#cffafe;border-color:#67e8f9;background:rgba(103,232,249,.15)}.freetop{display:grid;grid-template-columns:minmax(0,1fr) 86px;gap:14px;align-items:end;margin-top:16px}.freetitle{font-size:22px;font-weight:950;color:#cffafe}.freetime{font-size:clamp(54px,16vw,68px);font-weight:950;line-height:1;margin-top:6px}.freesub{font-size:20px;font-weight:950;color:#cffafe;margin-top:4px}.freenext{margin-top:16px;border:1px solid rgba(103,232,249,.45);background:rgba(255,255,255,.10);border-radius:20px;padding:12px}.freenext span{display:block;font-size:14px;text-transform:uppercase;letter-spacing:.08em;color:#a5f3fc;font-weight:950}.freenext b{display:block;font-size:22px;line-height:1.15;margin-top:4px}.freenext small{display:block;font-size:17px;color:#cffafe;margin-top:6px;font-weight:900}.free .ring{--ring:#06b6d4;--track:rgba(255,255,255,.18);--inner:var(--cyan);color:#ecfeff}.free.leave-now{background:var(--amber);border-color:var(--amberLine)}.free.leave-now .kicker,.free.leave-now .freetitle,.free.leave-now .freesub,.free.leave-now .freenext span{color:#fde68a}.free.leave-now .pill{border-color:#fbbf24;background:rgba(251,191,36,.15)}.free.leave-now .ring{--ring:#f59e0b;--inner:var(--amber)}
.next.meal{background:var(--greenSoft);border-color:var(--greenLine);color:var(--green)}.next.procedure{background:var(--violetSoft);border-color:var(--violetLine);color:var(--violet)}.next .pill{background:rgba(255,255,255,.62)}.next.meal .pill{color:#166534;border-color:#86efac}.next.procedure .pill{color:#4c1d95;border-color:#c4b5fd}.next .kicker{padding-right:118px}.next.meal .kicker{color:#166534}.next.procedure .kicker{color:#7c3aed}.nexttime{font-size:clamp(56px,17vw,76px);font-weight:950;line-height:1;margin-top:14px}.nexttitle{font-size:clamp(32px,9vw,42px);font-weight:950;line-height:1.05;margin-top:12px}.nextplace{font-size:24px;font-weight:950;margin-top:14px}.next.meal .nextplace{color:#174e27}.next.procedure .nextplace{color:#5b21b6}.next.meal .ring{--ring:#16a34a;--track:#bbf7d0;--inner:#f0fdf4}.next.procedure .ring{--ring:#8b5cf6;--track:#d8cff0;--inner:#f8fafc}.leavegrid{display:grid;grid-template-columns:minmax(0,1fr) 88px;gap:12px;margin-top:20px;align-items:center}.leave{border-radius:22px;border:1px solid #ddd6fe;background:rgba(255,255,255,.72);padding:13px}.next.meal .leave{border-color:#86efac;background:#f0fdf4}.label{font-size:14px;font-weight:950;text-transform:uppercase;letter-spacing:.08em}.next.procedure .label{color:#7c3aed}.next.meal .label{color:#166534}.leave .value{font-size:36px;font-weight:950;line-height:1;margin-top:6px}.leave b{font-size:16px}.startlabel{text-align:center;font-size:13px;font-weight:950;text-transform:uppercase}
.list{display:flex;flex-direction:column;gap:12px}.item{border:1px solid;border-radius:26px;padding:14px;display:grid;grid-template-columns:minmax(0,1fr) 92px;gap:10px;align-items:start;overflow:hidden}.item.meal{background:var(--greenSoft);border-color:var(--greenLine);color:var(--green)}.item.procedure{background:var(--violetSoft);border-color:var(--violetLine);color:var(--violet)}.item.done{display:none}.itemtime{display:flex;flex-wrap:nowrap;white-space:nowrap;gap:7px;align-items:baseline;font-size:clamp(31px,8.5vw,38px);font-weight:950;line-height:1;letter-spacing:-.04em}.itemtime .end{opacity:.48}.itemtitle{font-size:clamp(25px,7vw,31px);line-height:1.08;font-weight:950;margin-top:13px}.itemplace{font-size:22px;line-height:1.2;font-weight:950;opacity:.82;margin-top:12px}.right{text-align:right}.tag{display:inline-flex;border-radius:999px;border:1px solid;padding:5px 9px;font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}.meal .tag{background:#dcfce7;border-color:#86efac;color:#166534}.procedure .tag{background:#f4efff;border-color:#c4b5fd;color:#4c1d95}.mini{margin-top:10px;border:1px solid;border-radius:18px;padding:8px 7px}.meal .mini{background:#dcfce7;border-color:#86efac}.procedure .mini{background:#f4efff;border-color:#ddd6fe}.mini span{font-size:13px;font-weight:950;opacity:.9}.mini b{display:block;font-size:28px;line-height:1;margin-top:4px;letter-spacing:-.04em}
.topstats,.info-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.topstat{border:1px solid;border-radius:26px;padding:18px}.topstat b{display:block;font-size:clamp(42px,12vw,56px);line-height:1}.topstat span{font-size:18px;color:#cbd5e1}.info-grid{margin-top:16px}.info{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:14px;min-width:0}.info.wide{grid-column:1/-1}.info span{display:block;color:#94a3b8;font-size:12px;font-weight:950;text-transform:uppercase;letter-spacing:.13em}.info b{display:block;font-size:20px;line-height:1.18;margin-top:8px;overflow-wrap:anywhere}.info p{margin:6px 0 0;color:#cbd5e1;font-size:15px;font-weight:800}.progress{height:8px;border-radius:99px;background:#334155;overflow:hidden;margin-top:10px}.progress i{display:block;height:100%;background:#a78bfa;border-radius:99px}.summary-row{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;font-size:19px}.summary-row b:last-child{white-space:nowrap}
textarea{width:100%;height:280px;border:1px solid #334155;border-radius:22px;background:#020617;color:white;padding:14px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;line-height:1.45}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.btn{border:0;border-radius:18px;padding:15px 10px;font-size:19px;font-weight:950;color:white;background:#8b5cf6}.btn.secondary{background:#064e3b;border:1px solid rgba(34,197,94,.45)}.msg{border-radius:18px;background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:12px;margin:12px 0;font-weight:900}.fatal{max-width:430px;margin:40px auto;padding:18px;color:white;background:#450a0a;border:1px solid #ef4444;border-radius:22px;font:16px system-ui}.fatal b{display:block;font-size:24px;margin-bottom:8px}
nav{position:fixed;left:0;right:0;bottom:0;z-index:10;border-top:1px solid #1e293b;background:rgba(2,6,23,.97);backdrop-filter:blur(14px);padding:9px 8px calc(9px + env(safe-area-inset-bottom))}.nav-inner{max-width:430px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:4px}nav button{border:0;border-radius:20px;background:transparent;color:#94a3b8;padding:10px 4px;font-size:12px;font-weight:950}nav button.active{background:#8b5cf6;color:white}.ico{display:block;font-size:23px;line-height:1;margin-bottom:5px}
@media (orientation:landscape) and (min-width:700px){.app,.nav-inner,.head{max-width:760px}.app{padding-bottom:96px}.content{padding:14px 18px}.logo{width:54px;height:54px;border-radius:17px}h1{font-size:30px}.next{display:grid;grid-template-columns:minmax(0,1fr) minmax(250px,.75fr);column-gap:18px;align-items:center}.next .kicker{grid-column:1/-1;padding-right:140px}.nexttime{font-size:52px}.nexttitle{font-size:32px}.nextplace{font-size:21px}.next .leavegrid{grid-column:2;grid-row:2/5;margin-top:0}.day .date{font-size:34px}.stat b{font-size:30px}.fullstat{font-size:17px}.itemtime{font-size:34px}.itemtitle{font-size:28px}}

<body>
<div id="app"><div class="fatal"><b>Načítám…</b>Pokud to zůstane viset, obnov stránku.</div></div>
<script>
(()=>{
'use strict';
const VERSION='v15-free-card';
const STORAGE='lazensky_commander_schedule_v10';
const app=document.getElementById('app');
const stay={appName:'Lázeňský Komandér',spaName:'Slatinné lázně Třeboň',mealShift:'1. směna',leaveBufferMinutes:15,room:'1LDB-A / 133',doctor:'MUDr. Čech',diagnosis:'G112 Mozečková ataxie',doctorOffice:'Ordinace 214 · 2. patro · LDB',stayFrom:'2026-05-22',stayTo:'2026-06-18'};
const procs=[['Slatinná koupel','LDB-Slatina 1',20],['Klasická masáž částečná','LDB-Slatina 1',20],['Vysokoindukční magnet','LDB-Elektroléčba',20],['Parafínový zábal','LDB-Parafín',20],['IMOOVE','LDB-Fyzioterapie 4',20],['Vířivka dolní končetiny','LDB-Vodoléčba',20],['Ultrazvuk','LDB-Elektroléčba',20],['Fyzioterapie individuální','LDB-Fyzioterapie 3',30],['Skupinové cvičení','Tělocvična',30],['Bazén','LDB-Bazén',30]];
const patterns=[['08:15','08:45','10:30'],['08:00','09:30','12:00'],['09:00','10:30','12:15'],['08:05','08:40','10:30'],['08:30','10:00','12:10'],['09:15','11:50']];
let tab='today',openDate=null,data=null,raw='',msg='Import připravený.';
function pad(n){return String(n).padStart(2,'0')}
function iso(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function dObj(s){return new Date(s+'T12:00:00')}
function dt(d,t){return new Date(d+'T'+t+':00')}
function addDays(d,n){const x=new Date(d);x.setHours(12,0,0,0);x.setDate(x.getDate()+n);return x}
function addMin(d,m){return new Date(d.getTime()+m*60000)}
function mins(a,b){return Math.round((b-a)/60000)}
function tAdd(t,m){const p=t.split(':').map(Number),v=p[0]*60+p[1]+m;return pad(Math.floor(v/60))+':'+pad(v%60)}
function fmtTime(d){return new Intl.DateTimeFormat('cs-CZ',{hour:'2-digit',minute:'2-digit'}).format(d)}
function fmtDate(s){return new Intl.DateTimeFormat('cs-CZ',{weekday:'long',day:'numeric',month:'numeric'}).format(dObj(s))}
function fmtFull(s){return new Intl.DateTimeFormat('cs-CZ',{day:'numeric',month:'numeric',year:'numeric'}).format(dObj(s))}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function count(m){if(m<=0)return'teď';if(m<60)return m+' min';const h=Math.floor(m/60),r=m%60;return r?`${h} h ${r} min`:`${h} h`}
function ringText(m){return m<180?[Math.max(0,m),'MIN']:[Math.floor(m/60),'HOD']}
function ringPct(m,total){if(total)return Math.max(6,Math.min(96,Math.round((1-m/Math.max(1,total))*100)));return Math.max(14,Math.min(92,Math.round(100-(Math.min(m,720)/720)*86))}
function ringHtml(m,total){const r=ringText(m),p=ringPct(m,total);return`<div class="ring" style="--pct:${p}"><div>${r[0]}<small>${r[1]}</small></div></div>`}
function parseM(t){if(!t||t==='—')return null;const p=t.split(':').map(Number);return p[0]*60+p[1]}
function gap(a,b){const x=parseM(a),y=parseM(b);if(x==null||y==null)return'—';const d=y-x;if(d<=0)return'0 min';const h=Math.floor(d/60),m=d%60;return h&&m?`${h} h ${m} min`:h?`${h} h`:`${m} min`}
function build(){const start=dObj(stay.stayFrom),items=[];for(let day=0;day<28;day++){const dd=addDays(start,day),date=iso(dd),sun=dd.getDay()===0;if(day===0){items.push({id:`meal-${date}-dinner`,type:'meal',date,start:'17:00',end:'17:45',title:'Večeře',place:'Jídelna'});continue}items.push({id:`meal-${date}-breakfast`,type:'meal',date,start:'07:00',end:'07:45',title:'Snídaně',place:'Jídelna'});if(!sun){const pat=day===1?['08:15','08:45','10:30']:patterns[day%patterns.length];pat.forEach((t,i)=>{const p=procs[(day*2+i)%procs.length];items.push({id:`proc-${date}-${i}`,type:'procedure',date,start:t,end:tAdd(t,p[2]),title:p[0],place:p[1]})})}items.push({id:`meal-${date}-lunch`,type:'meal',date,start:'11:00',end:'11:45',title:'Oběd',place:'Jídelna'});items.push({id:`meal-${date}-dinner`,type:'meal',date,start:'17:00',end:'17:45',title:'Večeře',place:'Jídelna'})}return{stay,items}}
function normalize(src){if(typeof src==='string')src=JSON.parse(src);if(!src||!Array.isArray(src.items))throw Error('Import nemá položky.');return{stay:{...stay,...(src.stay||{})},items:src.items.map((i,n)=>({id:i.id||`${i.type}-${i.date}-${i.start}-${n}`,type:i.type==='meal'?'meal':'procedure',date:String(i.date),start:String(i.start),end:String(i.end||i.start),title:String(i.title||i.name),place:String(i.place||i.location||'—')}))}}
function dates(items=data.items){return Array.from(new Set(items.map(i=>i.date))).sort()}
function dayItems(date){return data.items.filter(i=>i.date===date).sort((a,b)=>a.start.localeCompare(b.start))}
function done(i,now){return dt(i.date,i.end)<now}
function stats(date){const list=dayItems(date),procs=list.filter(i=>i.type==='procedure'),meals=list.filter(i=>i.type==='meal'),first=list[0],last=procs[procs.length-1],dinner=meals.find(i=>i.title==='Večeře');return{count:procs.length,first:first?.start||'—',end:last?.end||'—',free:gap(last?.end,dinner?.start)}}
function header(){const s=data.stay;return`<header class="head"><div class="top"><button class="ghost">☰</button><button class="ghost">⚙</button></div><div class="hero"><img class="logo" src="./icon-180.png" alt="Logo"><div><h1>${esc(s.appName)}</h1></div></div></header>`}
function emptyNow(next,now){if(!next)return`<section class="card"><div class="kicker">Právě teď</div><div class="emptytitle">Volno</div><div class="emptytext">Na dnešek už nic dalšího nevidím.</div></section>`;const meal=next.type==='meal',start=dt(next.date,next.start),leave=addMin(start,-data.stay.leaveBufferMinutes),toLeave=mins(now,leave),toStart=Math.max(0,mins(now,start)),go=toLeave<=0;return`<section class="card free ${go?'leave-now':''}"><span class="pill">${go?'Je čas vyrazit':'Volno'}</span><div class="kicker">Právě teď</div><div class="freetop"><div><div class="freetitle">${go?'Vyrazit na '+(meal?'jídlo':'proceduru'):'Volno do odchodu'}</div><div class="freetime">${fmtTime(leave)}</div><div class="freesub">${go?'začíná v '+next.start:'zbývá '+count(Math.max(0,toLeave))}</div></div><div class="ringbox"><div class="ringlabel">${go?'start':'zbývá'}</div>${ringHtml(Math.max(0,go?toStart:toLeave),null)}</div></div><div class="freenext"><span>${meal?'Další jídlo':'Další procedura'} · ${next.start}</span><b>${esc(next.title)}</b><small>${meal?'♨':'⌖'} ${esc(next.place)}</small></div></section>`}
function nowCard(i,now){const start=dt(i.date,i.start),end=dt(i.date,i.end),left=Math.max(0,mins(now,end)),total=Math.max(1,mins(start,end)),meal=i.type==='meal';return`<section class="card now ${meal?'meal':'procedure'}"><span class="pill">Probíhá</span><div class="kicker">Právě teď</div><div class="nowtime">${i.start} – ${i.end}</div><div class="nowtitle">${esc(i.title)}</div><div class="place">${meal?'♨':'⌖'} ${esc(i.place)}</div><div class="ringbox"><div class="ringlabel">Zbývá</div>${ringHtml(left,total)}</div></section>`}
function nextCard(i,now,rank=0){if(!i)return'';const meal=i.type==='meal',start=dt(i.date,i.start),leave=addMin(start,-data.stay.leaveBufferMinutes),toStart=Math.max(0,mins(now,start)),toLeave=Math.max(0,mins(now,leave)),other=iso(now)!==i.date,label=rank===0?'Následuje':'Potom',head=(rank===0?'Další':'Potom')+' '+(meal?'jídlo':'procedura');return`<section class="card next ${meal?'meal':'procedure'}"><span class="pill">${label}</span><div class="kicker">${head}${other?' · '+fmtDate(i.date):''}</div><div class="nexttime">${i.start}</div><div class="nexttitle">${esc(i.title)}</div><div class="nextplace">${meal?'♨':'⌖'} ${esc(i.place)}</div><div class="leavegrid"><div class="leave"><div class="label">Odejít nejpozději</div><div class="value">${fmtTime(leave)}</div><b>za ${count(toLeave)}</b></div><div class="startlabel">Začíná za${ringHtml(toStart,null)}</div></div></section>`}
function summary(date,label){const s=stats(date);return`<section class="card day"><div class="kicker">${label}</div><div class="date">${fmtDate(date)}</div><div class="stats"><div class="stat"><span>Procedury</span><b>${s.count}</b></div><div class="stat"><span>První</span><b>${s.first}</b></div><div class="stat"><span>Konec</span><b>${s.end}</b></div></div><div class="fullstat">Volno po procedurách do večeře: <b>${s.free}</b></div></section>`}
function item(i,now){const isDone=done(i,now),meal=i.type==='meal',leave=fmtTime(addMin(dt(i.date,i.start),-data.stay.leaveBufferMinutes));return`<article class="item ${meal?'meal':'procedure'} ${isDone?'done':''}"><div><div class="itemtime"><span>${i.start}</span><span class="end">– ${i.end}</span></div><div class="itemtitle">${esc(i.title)}</div><div class="itemplace">${meal?'♨':'⌖'} ${esc(i.place)}</div></div><div class="right"><span class="tag">${meal?'Jídlo':'Procedura'}</span><div class="mini"><span>Odejít</span><b>${leave}</b></div></div></article>`}
function today(){const now=new Date(),ds=dates(),today=ds.includes(iso(now))?iso(now):ds[0],view=ds.includes(iso(now))?now:dt(today,'07:20'),list=dayItems(today),cur=list.find(i=>view>=dt(i.date,i.start)&&view<=dt(i.date,i.end)),nextToday=list.find(i=>dt(i.date,i.start)>view),next2=data.items.filter(i=>dt(i.date,i.start)>view).sort((a,b)=>dt(a.date,a.start)-dt(b.date,b.start)).slice(0,2),visible=list.filter(i=>!done(i,view)),show=Boolean(cur||nextToday||visible.length),rest=visible.filter(i=>(!cur||i.id!==cur.id)&&!next2.some(n=>n.id===i.id));return`<main class="content">${show?summary(today,'Dnešní program'):''}${cur?nowCard(cur,view):emptyNow(nextToday,view)}${next2.map((i,n)=>nextCard(i,view,n)).join('')}${rest.length?`<div class="list">${rest.map(i=>item(i,view)).join('')}</div>`:''}</main>`}
function tomorrow(){const now=new Date(),ds=dates(),d=ds.includes(iso(addDays(now,1)))?iso(addDays(now,1)):(ds[1]||ds[0]),fake=dt(d,'06:00');return`<main class="content">${summary(d,'Zítra')}<div class="list">${dayItems(d).map(i=>item(i,fake)).join('')}</div></main>`}
function week(){const now=new Date(),ds=dates(),todayIso=iso(now),futureDays=ds.filter(d=>dayItems(d).some(i=>dt(i.date,i.end)>=now));const shown=futureDays.length?futureDays:ds;if(openDate&&!shown.includes(openDate))openDate=null;return`<main class="content">${shown.map(d=>`<section><button style="all:unset;display:block;width:100%" data-open="${d}">${summary(d,'Den pobytu')}</button>${openDate===d?`<div class="list" style="margin-top:12px">${dayItems(d).filter(i=>d!==todayIso||!done(i,now)).map(i=>item(i,d===todayIso?now:dt(d,'06:00'))).join('')}</div>`:''}</section>`).join('')}</main>`}
function stayView(){const now=new Date(),rows=new Map();data.items.filter(i=>i.type==='procedure').forEach(i=>{const r=rows.get(i.title)||{name:i.title,planned:0,used:0};r.planned++;if(done(i,now))r.used++;rows.set(i.title,r)});const arr=Array.from(rows.values()).sort((a,b)=>b.planned-a.planned||a.name.localeCompare(b.name,'cs')),used=arr.reduce((a,r)=>a+r.used,0),planned=arr.reduce((a,r)=>a+r.planned,0),s=data.stay,ds=dates(),total=ds.length,todayNoon=dObj(iso(now));let elapsed=ds.filter(d=>dObj(d)<=todayNoon).length;if(elapsed<1)elapsed=0;if(elapsed>total)elapsed=total;return`<main class="content"><div class="topstats"><div class="topstat" style="background:#1e1038;border-color:#6d28d9"><span>Procedury</span><b>${used}/${planned}</b><p>vyčerpáno / plán</p></div><div class="topstat" style="background:#04251f;border-color:#16a34a"><span>Dny pobytu</span><b>${elapsed}/${total}</b><p>dnes / celkem</p></div></div><section class="card"><h2>Informace o pobytu</h2><div class="info-grid"><div class="info"><span>Lázně</span><b>${esc(s.spaName)}</b></div><div class="info"><span>Pobyt</span><b>${fmtFull(s.stayFrom)} až ${fmtFull(s.stayTo)}</b></div><div class="info"><span>Lékař</span><b>${esc(s.doctor)}</b><p>${esc(s.doctorOffice)}</p></div><div class="info"><span>Diagnóza</span><b>${esc(s.diagnosis)}</b></div><div class="info"><span>Pokoj</span><b>${esc(s.room)}</b></div><div class="info"><span>Jídlo</span><b>${esc(s.mealShift)}</b></div><div class="info wide"><span>Přesun</span><b>${esc(s.leaveBufferMinutes)} min rezerva před událostí</b></div></div></section><section class="card"><h2>Souhrn procedur</h2><div class="list">${arr.map(r=>`<div class="info"><div class="summary-row"><b>${esc(r.name)}</b><b>${r.used}/${r.planned}</b></div><div class="progress"><i style="width:${Math.round(r.used/r.planned*100)}%"></i></div></div>`).join('')}</div></section></main>`}
function importView(){return`<main class="content"><section class="card"><h2>Import / změna rozpisu</h2><div class="msg">${esc(msg)}</div><textarea id="raw">${esc(raw)}</textarea><div class="actions"><button class="btn" id="load">Načíst</button><button class="btn secondary" id="sample">28 dnů</button></div></section></main>`}
function nav(){const tabs=[['today','Dnes','◷'],['tomorrow','Zítra','▦'],['week','Týden','▦'],['stay','Pobyt','♙'],['import','Import','☁']];return`<nav><div class="nav-inner">${tabs.map(t=>`<button data-tab="${t[0]}" class="${tab===t[0]?'active':''}"><span class="ico">${t[2]}</span>${t[1]}</button>`).join('')}</div></nav>`}
function render(){try{const views={today,tomorrow,week,stay:stayView,import:importView};app.innerHTML=`<div class="app">${header()}${views[tab]()}${nav()}</div>`;bind()}catch(e){app.innerHTML=`<div class="fatal"><b>Chyba aplikace</b>${esc(e.message)}<br>Verze: ${VERSION}</div>`;console.error(e)}}
function bind(){document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{tab=b.dataset.tab;if(tab==='week')openDate=null;window.scrollTo(0,0);render()});document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>{openDate=openDate===b.dataset.open?'':b.dataset.open;render()});const load=document.getElementById('load');if(load)load.onclick=()=>{try{raw=document.getElementById('raw').value;data=normalize(raw);localStorage.setItem(STORAGE,JSON.stringify(data));msg='Načteno: '+data.items.length+' položek.';render()}catch(e){msg=e.message;render()}};const sample=document.getElementById('sample');if(sample)sample.onclick=()=>{data=build();raw=JSON.stringify(data,null,2);localStorage.setItem(STORAGE,JSON.stringify(data));msg='Vložený testovací pobyt na 28 dnů.';render()}}
function init(){try{const saved=localStorage.getItem(STORAGE);data=saved?normalize(saved):null}catch(e){data=null}if(!data)data=build();raw=JSON.stringify(data,null,2);render();setInterval(render,30000)}
init();
})();
</script>
